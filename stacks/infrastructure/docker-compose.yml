services:
  # FILE BROWSER
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: 0:0 
    ports:
      - 8082:80
    volumes:
      - /:/srv
      - /home/gopi/docker/infrastructure/filebrowser/filebrowser.db:/database.db
    restart: unless-stopped
    labels:
      - "homepage.group=Infrastructure"
      - "homepage.name=File Browser"
      - "homepage.icon=filebrowser.svg"
      - "homepage.href=http://192.168.2.125:8082"
      - "homepage.description=Root File Management"

  # SCRUTINY - Hard Drive Health
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    ports:
      - 8084:8080
    volumes:
      - /run/udev:/run/udev:ro
      - /home/gopi/docker/infrastructure/scrutiny:/opt/scrutiny/config
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
    restart: unless-stopped
    labels:
      - "homepage.group=Infrastructure"
      - "homepage.name=Scrutiny"
      - "homepage.icon=scrutiny.svg"
      - "homepage.href=http://192.168.2.125:8084"
      - "homepage.description=HDD Smart Health"
      - "homepage.widget.type=scrutiny"
      - "homepage.widget.url=http://192.168.2.125:8084"

  # GOTIFY
  gotify:
    image: gotify/server
    container_name: gotify
    ports:
      - 8081:80
    environment:
      - GOTIFY_DEFAULTUSER_PASS=admin
    volumes:
      - /home/gopi/docker/infrastructure/gotify:/app/data
    restart: unless-stopped
    labels:
      - "homepage.group=Infrastructure"
      - "homepage.name=Gotify"
      - "homepage.icon=gotify.svg"
      - "homepage.href=http://192.168.2.125:8081"

  # ACTUAL BUDGET
  actual_server:
    image: ghcr.io/actualbudget/actual-server:latest
    container_name: actual_server
    ports:
      - 5006:5006
    volumes:
      - /mnt/seagate/actual-data:/data
    restart: unless-stopped
    labels:
      - "homepage.group=Personal"
      - "homepage.name=Actual Budget"
      - "homepage.icon=actual.svg"
      - "homepage.href=http://192.168.2.125:5006"
      - "homepage.widget.type=actualbudget"
      - "homepage.widget.url=http://192.168.2.125:5006"

  # BENTOPDF
  bentopdf:
    image: bentopdf/bentopdf:latest
    container_name: bentopdf
    ports:
      - 8085:8080
    volumes:
      - /home/gopi/docker/infrastructure/bentopdf-data:/config
    restart: unless-stopped
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=BentoPDF"
      - "homepage.icon=bentopdf.svg"
      - "homepage.href=http://192.168.2.125:8085"
