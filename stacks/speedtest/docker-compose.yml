services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - APP_KEY=base64:a9fPMpGFBbDEgDZuOFoAGBVMxqj/Hfn6sKJJopmlMFc=
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE="0 * * * *"
    volumes:
      - ./data:/config
    ports:
      - 8765:80
    restart: unless-stopped
