services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - /home/gopi/docker/paperless/redisdata:/data

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - /home/gopi/docker/paperless/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: your_secure_password_here

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    ports:
      - "8010:8000"
    volumes:
      # SSD: Configuration and Search Index (for speed)
      - /home/gopi/docker/paperless/data:/usr/src/paperless/data
      # HDD: The actual PDFs and Media (for bulk storage)
      - /mnt/seagate/paperless/media:/usr/src/paperless/media
      - /mnt/seagate/paperless/export:/usr/src/paperless/export
      - /mnt/seagate/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBPASS: your_secure_password_here
      PAPERLESS_TIME_ZONE: America/Toronto # Change to your timezone
      PAPERLESS_OCR_LANGUAGE: eng
      # This helps with permissions since you are the user 'gopi'
      USER_ID: 1000
      GROUP_ID: 1000
